<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUNGAMA ESPORTS – India’s Premium BGMI Tournament Platform</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c2bd9;
            --primary-dark: #4f1aa8;
            --primary-glow: rgba(108, 43, 217, 0.5);
            --accent: #ff4d6d;
            --dark: #0b0a12;
            --dark-card: #131126;
            --dark-card-hover: #1d1a3a;
            --text-light: #f0edff;
            --text-muted: #a8a3c7;
            --radius: 16px;
            --transition: 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== HEADER ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(11, 10, 18, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(108, 43, 217, 0.15);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #a855f7, #6c2bd9, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo i {
            -webkit-text-fill-color: initial;
            color: var(--accent);
            font-size: 1.4rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .nav-links a {
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 30px;
            transition: var(--transition);
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .nav-links a:hover {
            color: #fff;
            background: rgba(108, 43, 217, 0.12);
        }

        .nav-links .register-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-weight: 700;
            padding: 10px 28px;
            box-shadow: 0 4px 20px var(--primary-glow);
            border-radius: 40px;
        }
        .nav-links .register-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px var(--primary-glow);
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: #fff;
            border-radius: 4px;
            transition: var(--transition);
        }

        /* ===== HERO ===== */
        .hero {
            padding: 80px 0 70px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle at 30% 40%, rgba(108, 43, 217, 0.12), transparent 55%),
                radial-gradient(circle at 70% 60%, rgba(255, 77, 109, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(108, 43, 217, 0.15);
            border: 1px solid rgba(108, 43, 217, 0.25);
            padding: 6px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        .hero-badge i {
            color: var(--accent);
            margin-right: 8px;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            line-height: 1.1;
            margin-bottom: 12px;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, #a855f7, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero .tagline {
            font-size: 1.3rem;
            font-weight: 600;
            color: #c4b5fd;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 32px;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .btn-primary {
            display: inline-block;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            box-shadow: 0 6px 30px var(--primary-glow);
            transition: var(--transition);
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 45px var(--primary-glow);
        }

        .btn-secondary {
            display: inline-block;
            padding: 16px 44px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            background: transparent;
            color: #fff;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            transition: var(--transition);
            cursor: pointer;
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(108, 43, 217, 0.08);
            transform: translateY(-3px);
        }

        /* ===== SECTION TITLES ===== */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            text-align: center;
            margin-bottom: 12px;
        }
        .section-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 44px;
        }

        /* ===== TOURNAMENTS ===== */
        .tournaments {
            padding: 60px 0 70px;
        }

        .tournament-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        .tournament-card {
            background: var(--dark-card);
            border: 1px solid rgba(108, 43, 217, 0.12);
            border-radius: var(--radius);
            padding: 26px 22px 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .tournament-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
        }
        .tournament-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 43, 217, 0.3);
            background: var(--dark-card-hover);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .tournament-card:hover::before {
            opacity: 1;
        }

        .tournament-tag {
            display: inline-block;
            background: rgba(108, 43, 217, 0.2);
            color: #a855f7;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 14px;
            border-radius: 30px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tournament-card .game-icon {
            font-size: 2rem;
            margin-bottom: 6px;
            color: var(--accent);
        }

        .tournament-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .tournament-card .game-mode {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tournament-card .details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 12px 0 14px;
        }
        .tournament-card .details i {
            width: 18px;
            color: var(--primary);
        }

        .tournament-card .prize {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #facc15;
            margin-bottom: 16px;
        }

        .tournament-card .register-link {
            display: inline-block;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .tournament-card .register-link:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 24px var(--primary-glow);
            transform: scale(1.03);
        }

        /* ===== HOW IT WORKS ===== */
        .how-it-works {
            padding: 50px 0 70px;
            background: rgba(108, 43, 217, 0.03);
            border-top: 1px solid rgba(108, 43, 217, 0.06);
            border-bottom: 1px solid rgba(108, 43, 217, 0.06);
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 960px;
            margin: 0 auto;
        }

        .step {
            text-align: center;
            padding: 20px 12px;
        }
        .step .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px var(--primary-glow);
        }
        .step h4 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .step p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ===== NEWSLETTER ===== */
        .newsletter {
            padding: 60px 0 70px;
            text-align: center;
        }

        .newsletter-box {
            max-width: 600px;
            margin: 0 auto;
            background: var(--dark-card);
            border: 1px solid rgba(108, 43, 217, 0.12);
            border-radius: var(--radius);
            padding: 40px 32px;
        }

        .newsletter-box h3 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .newsletter-box p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .newsletter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .newsletter-form input {
            flex: 1;
            min-width: 200px;
            padding: 14px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }
        .newsletter-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 43, 217, 0.15);
        }
        .newsletter-form input::placeholder {
            color: var(--text-muted);
        }
        .newsletter-form button {
            padding: 14px 36px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 24px var(--primary-glow);
        }
        .newsletter-form button:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 36px var(--primary-glow);
        }

        /* ===== FOOTER ===== */
        footer {
            background: #0a0818;
            border-top: 1px solid rgba(108, 43, 217, 0.08);
            padding: 50px 0 30px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.8fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-brand .logo {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .footer-brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 300px;
        }

        .footer-col h5 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 16px;
            color: #fff;
        }
        .footer-col ul li {
            margin-bottom: 8px;
        }
        .footer-col ul li a {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .footer-col ul li a:hover {
            color: #fff;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .footer-bottom p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .footer-socials {
            display: flex;
            gap: 14px;
        }
        .footer-socials a {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .footer-socials a:hover {
            color: #fff;
            transform: translateY(-3px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 820px) {
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
                padding: 16px 0 8px;
                border-top: 1px solid rgba(108, 43, 217, 0.1);
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links a {
                padding: 10px 16px;
                text-align: center;
                border-radius: 8px;
            }
            .hamburger {
                display: flex;
            }
            .hero h1 {
                font-size: 2.4rem;
            }
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .footer-brand p {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 40px 0 40px;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .btn-primary,
            .btn-secondary {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
            .tournament-grid {
                grid-template-columns: 1fr;
            }
            .newsletter-box {
                padding: 28px 18px;
            }
        }
    </style>
</head>
