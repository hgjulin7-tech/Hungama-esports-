<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hungama Esports</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e14;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(145deg, #121820, #1a232e);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        /* ===== HEADING ===== */
        .main-heading {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .main-heading h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f5c842, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 200, 0, 0.25);
            display: inline-block;
            position: relative;
        }

        .main-heading h1::after {
            content: "⚡";
            font-size: 2.8rem;
            -webkit-text-fill-color: initial;
            color: #f5c842;
            margin-left: 12px;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .main-heading .sub-tag {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            color: #aab8c9;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 6px;
            -webkit-text-fill-color: #aab8c9;
            background: none;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.2) rotate(12deg);
            }
        }

        /* ===== LOGO / IMAGE SECTION ===== */
        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2rem;
            border: 1px dashed rgba(255, 215, 0, 0.25);
        }

        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .logo-box .logo-placeholder {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #2a3748, #0f151e);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.6rem;
            color: #f5c842;
            border: 3px solid #f5c842;
            box-shadow: 0 0 30px rgba(245, 200, 66, 0.2);
            transition: 0.3s;
        }

        .logo-box .logo-placeholder:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(245, 200, 66, 0.4);
        }

        .logo-box span {
            font-size: 0.9rem;
            color: #8899aa;
            letter-spacing: 1px;
        }

        .game-banner {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-banner .img-card {
            background: #1f2a37;
            padding: 0.6rem 1.8rem 0.6rem 1.2rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #2f3d4e;
            font-weight: 600;
            font-size: 1rem;
            color: #d4e0ed;
            transition: 0.25s;
        }

        .game-banner .img-card i {
            font-size: 1.6rem;
            color: #f5c842;
        }

        .game-banner .img-card:hover {
            background: #2a384b;
            border-color: #f5c842;
            transform: translateY(-3px);
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn {
            padding: 0.9rem 3rem;
            border: none;
            border-radius: 60px;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .btn-register {
            background: linear-gradient(135deg, #f5c842, #e6a800);
            color: #0b0e14;
        }

        .btn-register:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(245, 200, 66, 0.4);
        }

        .btn-join {
            background: transparent;
            color: #f5c842;
            border: 2.5px solid #f5c842;
        }

        .btn-join:hover {
            background: #f5c842;
            color: #0b0e14;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(245, 200, 66, 0.25);
        }

        /* ===== TWO-COLUMN LAYOUT ===== */
        .row-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 860px) {
            .row-split {
                grid-template-columns: 1fr;
                gap: 2.8rem;
            }
        }

        /* ===== REGISTRATION FORM ===== */
        .form-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(4px);
        }

        .form-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f5c842;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-section h2 i {
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #b0c4db;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #f5c842;
            width: 20px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: #1a232e;
            border: 1.5px solid #2c3a4a;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            transition: 0.25s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #f5c842;
            box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.15);
            background: #1f2b39;
        }

        .form-group input::placeholder {
            color: #6a7e94;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #f5c842, #e6a800);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .form-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(245, 200, 66, 0.35);
        }

        /* ===== TABLE & LIST ===== */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1.8rem 1.8rem 2rem;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }

        .info-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5c842;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card h3 i {
            font-size: 1.5rem;
        }

        /* TABLE */
        .styled-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            border-radius: 16px;
            overflow: hidden;
        }

        .styled-table thead {
            background: #1f2a37;
        }

        .styled-table thead th {
            padding: 0.9rem 1rem;
            text-align: left;
            font-weight: 700;
            color: #f5c842;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .styled-table tbody td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #1f2a37;
            color: #d4e0ed;
        }

        .styled-table tbody tr:hover {
            background: rgba(245, 200, 66, 0.05);
        }

        .styled-table tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            background: #2a384b;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f5c842;
        }

        /* LIST */
        .custom-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .custom-list li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0.7rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border-left: 4px solid #f5c842;
            color: #cbdae8;
            font-weight: 500;
            transition: 0.2s;
        }

        .custom-list li:hover {
            background: rgba(245, 200, 66, 0.07);
            transform: translateX(6px);
        }

        .custom-list li i {
            color: #f5c842;
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        /* ===== QR CODE ===== */
        .qr-section {
            margin-top: 2.5rem;
            padding: 2rem 1.8rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .qr-section h3 {
            font-size: 1.6rem;
            color: #f5c842;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qr-section p {
            color: #8899aa;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
        }

        .qr-box {
            width: 160px;
            height: 160px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #f5c842;
            box-shadow: 0 0 50px rgba(245, 200, 66, 0.15);
            transition: 0.3s;
            position: relative;
        }

        .qr-box:hover {
            transform: scale(1.04);
            box-shadow: 0 0 70px rgba(245, 200, 66, 0.25);
        }

        .qr-box .qr-placeholder {
            font-size: 5rem;
            color: #0b0e14;
            background: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .qr-box .qr-placeholder small {
            font-size: 1rem;
            display: block;
            font-weight: 400;
            letter-spacing: 0;
            margin-top: 2px;
            color: #555;
        }

        .qr-box .scan-me {
            position: absolute;
            bottom: -14px;
            background: #f5c842;
            color: #0b0e14;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ===== RESPONSIVE TWEAKS ===== */
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem 1rem;
            }

            .main-heading h1 {
                font-size: 2.6rem;
            }

            .btn {
                padding: 0.7rem 1.8rem;
                font-size: 1rem;
            }

            .logo-box .logo-placeholder {
                width: 80px;
                height: 80px;
                font-size: 2.8rem;
            }

            .qr-box {
                width: 130px;
                height: 130px;
            }

            .qr-box .qr-placeholder {
                font-size: 3.8rem;
            }
        }

        @media (max-width: 400px) {
            .main-heading h1 {
                font-size: 2rem;
            }

            .form-section {
                padding: 1.2rem 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- ===== HEADING ===== -->
        <div class="main-heading">
            <h1>Hungama Esports</h1>
            <span class="sub-tag"><i class="fas fa-gamepad" style="margin-right:8px;"></i> Battle Royale · Tournaments · Glory</span>
        </div>

        <!-- ===== IMAGES & LOGO ===== -->
        <div class="logo-section">
            <div class="logo-box">
                <div class="logo-placeholder">
                    <i class="fas fa-crown"></i>
                </div>
                <span>🏆 Official Logo</span>
            </div>

            <div class="game-banner">
                <div class="img-card">
                    <i class="fas fa-fire"></i> BGMI
                </div>
                <div class="img-card">
                    <i class="fas fa-robot"></i> Free Fire
                </div>
                <div class="img-card">
                    <i class="fas fa-chess-queen"></i> COD
                </div>
                <div class="img-card">
                    <i class="fas fa-skull"></i> Valorant
                </div>
            </div>
        </div>

        <!-- ===== BUTTONS ===== -->
        <div class="btn-group">
            <button class="btn btn-register" onclick="document.getElementById('registerForm').scrollIntoView({behavior:'smooth'});">
                <i class="fas fa-user-plus"></i> Register
            </button>
            <button class="btn btn-join" onclick="alert('🎮 Join our Discord / WhatsApp community!')">
                <i class="fas fa-users"></i> Join
            </button>
        </div>

        <!-- ===== ROW: FORM + TABLE/LIST ===== -->
        <div class="row-split">

            <!-- ===== REGISTRATION FORM ===== -->
            <div class="form-section" id="registerForm">
                <h2><i class="fas fa-clipboard-list"></i> Registration</h2>

                <form onsubmit="event.preventDefault(); alert('✅ Registration submitted successfully!');">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Player Name</label>
                        <input type="text" placeholder="e.g. ProGamer_47" required />
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-id-card"></i> UID</label>
                            <input type="text" placeholder="1234567890" required />
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-users"></i> Team Name</label>
                            <input type="text" placeholder="e.g. Venom Squad" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" placeholder="you@example.com" required />
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Mobile</label>
                            <input type="tel" placeholder="+91 98765 43210" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-trophy"></i> Game</label>
                        <select>
                            <option>BGMI</option>
                            <option>Free Fire</option>
                            <option>Call of Duty</option>
                            <option>Valorant</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <button type="submit" class="form-submit">
                        <i class="fas fa-paper-plane"></i> Register Now
                    </button>
                </form>
            </div>

            <!-- ===== TABLE + LIST ===== -->
            <div class="info-section">

                <!-- TABLE -->
                <div class="info-card">
                    <h3><i class="fas fa-table"></i> Leaderboard</h3>
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Team</th>
                                <th>Points</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td><i class="fas fa-crown" style="color:#f5c842;"></i> Venom</td>
                                <td>2840</td>
                                <td><span class="badge">Qualified</span></td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Fury X</td>
                                <td>2710</td>
                                <td><span class="badge">Qualified</span></td>
                            </tr>
       




                            <button id="adminBtn">🔒 Admin Panel</button>

<div id="adminPanel" style="display:none;">
  <h2>Admin Panel</h2>
  <button>📋 View Registrations</button>
  <button>🏆 Update Leaderboard</button>
  <button>➕ Add Tournament</button>
  <button>❌ Close Registration</button>
</div>
<button id="adminBtn">🔒 Admin Panel</button>
