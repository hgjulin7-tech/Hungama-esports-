<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>HUNGAMA ESPORTS · Tournament Registration</title>

    <!-- QRCode.js for generating QR (no UPI) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0000;
            color: #e6d6d6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== BLOOD RED / BLACK THEME ===== */
        :root {
            --blood: #8a0303;
            --blood-dark: #5a0101;
            --blood-glow: #b31b1b;
            --black: #0a0000;
            --black-soft: #140404;
            --red-dark: #3d0000;
            --red-light: #cc3333;
            --gold-accent: #c99a3b;
            --text-light: #f0e0e0;
            --text-muted: #b08888;
            --border-blood: #6b0202;
        }

        /* ===== BACKGROUND LAYER ===== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(130, 0, 0, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(180, 0, 0, 0.20) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(10, 0, 0, 0.98) 0%, #0a0000 100%);
            background-attachment: fixed;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 30% 40%, rgba(139, 0, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(200, 30, 30, 0.05) 0%, transparent 45%);
            pointer-events: none;
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 10% 15%, rgba(120, 0, 0, 0.06) 0%, transparent 20%),
                radial-gradient(circle at 85% 70%, rgba(160, 0, 0, 0.04) 0%, transparent 25%),
                radial-gradient(circle at 45% 90%, rgba(100, 0, 0, 0.05) 0%, transparent 18%);
            pointer-events: none;
        }

        /* ===== WRAPPER ===== */
        .app-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1.2rem 4rem;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2.5rem;
            background: rgba(10, 0, 0, 0.75);
            border-left: 4px solid var(--blood);
            border-bottom: 2px solid var(--blood-dark);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(180, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 0 12px 12px 0;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f0d0d0 0%, #cc4444 60%, #8a0303 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(180, 0, 0, 0.3);
        }

        .logo-area .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 6px;
            text-transform: uppercase;
            border-left: 2px solid var(--blood);
            padding-left: 12px;
            margin-top: 4px;
        }

        .header-poster {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .poster-upload-btn {
            background: var(--blood-dark);
            border: 1px solid var(--blood);
            color: #f0d0d0;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .poster-upload-btn:hover {
            background: var(--blood);
            border-color: var(--red-light);
            box-shadow: 0 0 20px rgba(180, 0, 0, 0.3);
            transform: scale(1.02);
        }

        #posterPreview {
            max-height: 60px;
            border-radius: 6px;
            border: 1px solid var(--border-blood);
            display: none;
            object-fit: cover;
        }

        /* ===== QR SECTION (no UPI) ===== */
        .qr-section {
            background: rgba(10, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-blood);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7), inset 0 0 60px rgba(80, 0, 0, 0.1);
        }

        .qr-left {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .qr-box {
            background: #0d0000;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--blood);
            box-shadow: 0 0 30px rgba(130, 0, 0, 0.25);
            display: inline-block;
            line-height: 0;
        }

        #qrcode {
            width: 110px;
            height: 110px;
            display: block;
        }

        #qrcode img,
        #qrcode canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 4px;
        }

        .qr-info h3 {
            font-size: 1.1rem;
            color: #f0d0d0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .qr-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .qr-info .fee {
            display: inline-block;
            margin-top: 8px;
            background: var(--blood-dark);
            padding: 4px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #f0d0d0;
            border: 1px solid var(--blood);
        }

        .qr-right {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
            border-left: 2px solid var(--blood-dark);
            padding-left: 1.5rem;
        }

        .qr-right strong {
            color: #e6b0b0;
            display: block;
            font-size: 0.9rem;
        }

        @media (max-width: 720px) {
            .qr-section {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .qr-left {
                justify-content: center;
            }
            .qr-right {
                text-align: center;
                border-left: none;
                border-top: 2px solid var(--blood-dark);
                padding-left: 0;
                padding-top: 1rem;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .header-poster {
                justify-content: center;
            }
            .logo-area .tagline {
                border-left: none;
                padding-left: 0;
            }
        }

        /* ===== MAP TABS ===== */
        .map-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--blood-dark);
            padding-bottom: 0.5rem;
        }

        .map-tab {
            background: transparent;
            border: 2px solid var(--blood-dark);
            color: var(--text-muted);
            padding: 0.65rem 1.8rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.25s;
            position: relative;
        }

        .map-tab:hover {
            border-color: var(--blood);
            color: #f0d0d0;
            background: rgba(130, 0, 0, 0.15);
        }

        .map-tab.active {
            background: var(--blood-dark);
            border-color: var(--blood);
            color: #fff;
            box-shadow: 0 0 25px rgba(130, 0, 0, 0.3);
        }

        .map-tab .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--blood);
            color: #fff;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
        }

        /* ===== REGISTRATION FORM ===== */
        .form-panel {
            display: none;
            background: rgba(10, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border-blood);
            border-radius: 20px;
            padding: 2rem 2rem 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(60, 0, 0, 0.08);
            animation: fadeUp 0.35s ease;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-panel h2 {
            font-size: 1.6rem;
            color: #f0d0d0;
            letter-spacing: 2px;
            border-left: 5px solid var(--blood);
            padding-left: 1rem;
            margin-bottom: 1.8rem;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem 2rem;
        }

        @media (max-width: 720px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .form-panel {
                padding: 1.5rem 1rem;
            }
            .map-tabs {
                justify-content: center;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-group label .required {
            color: var(--red-light);
            margin-left: 4px;
        }

        .form-group input,
        .form-group select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-blood);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #f0e0e0;
            font-size: 0.95rem;
            transition: 0.2s;
            outline: none;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--blood);
            box-shadow: 0 0 20px rgba(130, 0, 0, 0.25);
            background: rgba(20, 0, 0, 0.7);
        }

        .form-group input::placeholder {
            color: #6a4a4a;
        }

        .form-group select option {
            background: #0a0000;
            color: #f0e0e0;
        }

        /* role checkboxes */
        .role-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.7rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-blood);
        }

        .role-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #e0c8c8;
            text-transform: none;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .role-group input[type="checkbox"] {
            accent-color: var(--blood);
            width: 17px;
            height: 17px;
            cursor: pointer;
            filter: drop-shadow(0 0 4px rgba(180, 0, 0, 0.3));
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            padding: 0.5rem 0.5rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border-blood);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.85rem;
            width: 100%;
            cursor: pointer;
        }

        .file-input-wrapper input[type="file"]::file-selector-button {
            background: var(--blood-dark);
            border: none;
            color: #f0d0d0;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            margin-right: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .file-input-wrapper input[type="file"]::file-selector-button:hover {
            background: var(--blood);
            box-shadow: 0 0 16px rgba(130, 0, 0, 0.3);
        }

        .team-preview {
            margin-top: 6px;
            max-width: 120px;
            max-height: 80px;
            border-radius: 8px;
            border: 1px solid var(--border-blood);
            display: none;
            object-fit: cover;
        }

        .submit-btn {
            grid-column: 1 / -1;
            background: var(--blood-dark);
            border: 2px solid var(--blood);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 0.8rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 300px;
            justify-self: center;
        }

        .submit-btn:hover {
            background: var(--blood);
            border-color: var(--red-light);
            box-shadow: 0 0 40px rgba(180, 0, 0, 0.35);
            transform: scale(1.02);
        }

        /* ===== REGISTRATIONS LIST ===== */
        .reg-list {
            margin-top: 2rem;
            background: rgba(10, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-blood);
        }

        .reg-list h3 {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--blood-dark);
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }

        .reg-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(100, 0, 0, 0.2);
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .reg-item .name {
            color: #f0d0d0;
            font-weight: 600;
        }

        .reg-item .map-tag {
            background: var(--blood-dark);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e6b0b0;
            border: 1px solid var(--border-blood);
        }

        .reg-item .role-tag {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .footer {
            margin-top: 3.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-top: 1px solid var(--blood-dark);
            padding-top: 2rem;
            opacity: 0.6;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--blood-dark);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--blood);
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <!-- ===== APP ===== -->
